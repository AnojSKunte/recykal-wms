<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recykal WMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/css/app.css">
</head>
<body>

<!-- Login screen (shown before auth) -->
<div id="login-screen" style="display:none">
  <div class="login-card">
    <div class="login-logo">Recykal <span>WMS</span></div>
    <div class="login-sub">Warehouse Management System</div>
    <a class="login-btn" href="/api/auth/google">
      <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Sign in with Google
    </a>
    <div class="login-note">Use your Recykal Google account</div>
  </div>
</div>

<!-- App shell (shown after auth) -->
<div id="app-shell" style="display:none">
  <!-- App loader -->
  <div id="app-loader">
    <div class="ld-logo">Recykal <span>WMS</span></div>
    <div class="ld-ring"></div>
    <div class="ld-txt">Loading your workspace…</div>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-text">Recykal <span>WMS</span></div>
      <div class="sb-logo-sub">Warehouse Management</div>
    </div>
    <nav id="nav-list"></nav>
    <div class="sb-user">
      <div class="sb-user-name"  id="su-name">—</div>
      <div class="sb-user-role"  id="su-role">—</div>
      <div class="sb-user-email" id="su-email">—</div>
      <button class="logout-btn" onclick="App.logout()">Sign out</button>
    </div>
  </aside>

  <!-- Main content (pages injected here) -->
  <div id="main"></div>
</div>

<script src="/js/app.js" type="module"></script>
</body>
</html>
